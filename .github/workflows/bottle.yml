name: bottle
# Self-host bottles for the from-source fnd formula. Run after the formula's
# url/sha is bumped to a new fndr release. Builds on macOS runners, produces
# relocatable bottles, uploads them to a GitHub release, and writes the
# `bottle do` block back into the formula.
#
# NOTE: macos-13 is the last Intel runner GitHub offers; if it's retired or
# can't be scheduled, drop x86_64 and ship arm64-only bottles (Intel users
# fall back to building from source).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "fndr version to bottle (e.g. 0.0.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        # arm64 only: GitHub is retiring the macos-13 Intel runner. Intel users
        # build from source via the formula (the CXX -std fix is in `install`).
        # Re-add "macos-13" here to also bottle x86_64 if a runner is available.
        os: [macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Select newest Xcode
        # The runner's default Xcode 15.4 ships Clang 15 (C++14 default), but
        # MuPDF 1.27's C++ bindings need C++17 (thread_local, std::vector init,
        # stricter exception specs). Newer Xcode = Clang 16+ = C++17 default,
        # matching the local build that compiles cleanly.
        run: |
          xc=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "selecting $xc"
          sudo xcode-select -s "$xc"
          clang++ --version
      - name: Link this checkout as the tap
        # `brew tap <name> <path>` errors with a remote mismatch because the
        # tap is already known by its GitHub URL. Symlinking the checkout into
        # Homebrew's Taps dir makes `brew` build the formula from THIS checkout.
        run: |
          tap="$(brew --repository)/Library/Taps/ben-dev-au/homebrew-tap"
          rm -rf "$tap"
          mkdir -p "$(dirname "$tap")"
          ln -s "$GITHUB_WORKSPACE" "$tap"
      - name: Build + bottle
        run: |
          brew install --build-bottle --verbose ben-dev-au/tap/fnd
          brew bottle --json --no-rebuild \
            --root-url="https://github.com/ben-dev-au/homebrew-tap/releases/download/fnd-bottles-${{ inputs.version }}" \
            ben-dev-au/tap/fnd
      - uses: actions/upload-artifact@v5
        with:
          name: bottle-${{ matrix.os }}
          path: |
            *.bottle.tar.gz
            *.bottle.json

  publish:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: Homebrew/actions/setup-homebrew@main
      - name: Link this checkout as the tap
        run: |
          tap="$(brew --repository)/Library/Taps/ben-dev-au/homebrew-tap"
          rm -rf "$tap"
          mkdir -p "$(dirname "$tap")"
          ln -s "$GITHUB_WORKSPACE" "$tap"
      - uses: actions/download-artifact@v5
        with:
          path: bottles
          merge-multiple: true
      - name: Merge bottle blocks into the formula
        run: brew bottle --merge --write --no-commit bottles/*.bottle.json
      - name: Upload bottles to a GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="fnd-bottles-${{ inputs.version }}"
          # brew writes the local bottle as `name--version`, but the URL Homebrew
          # builds from root_url uses a single dash; rename before upload or it 404s.
          for f in bottles/*.bottle.tar.gz; do mv "$f" "${f/--/-}"; done
          gh release create "$tag" bottles/*.bottle.tar.gz --title "$tag" \
            --notes "fnd ${{ inputs.version }} bottles" \
            || gh release upload "$tag" bottles/*.bottle.tar.gz --clobber
      - name: Commit + push the bottle block
        # checkout is a detached HEAD, so push the new commit explicitly to main.
        run: |
          git -c user.name="fnd-bottle-bot" -c user.email="actions@github.com" \
            commit -am "fnd ${{ inputs.version }}: bottles"
          git push origin HEAD:main
